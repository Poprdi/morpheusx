# CI Pipeline for MorpheusX
#
# Runs on every push/PR to master branch.
# Fast feedback: lint → build-host → test-host (cascade, fail-fast)
#
# Separate workflows:
# - UEFI builds and E2E tests → manual only (uefi-e2e.yml)
# - Documentation → tags only (cargo-doc.yml)
# - Security audit → weekly + dependency changes (audit.yml)
# - Releases → tags only (release.yml)
#
# Requirements:
# - Rust 1.75+ (workspace minimum)
# - NASM (for bootloader assembly, but not needed for host tests)

name: CI

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Pin toolchain for reproducibility
  RUST_VERSION: "1.85"

# Cancel in-progress runs for same PR/branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # LINT: Format and clippy checks
  # ═══════════════════════════════════════════════════════════════════════════
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: rustfmt, clippy

      - name: Install NASM
        run: sudo apt-get update -qq && sudo apt-get install -y -qq nasm

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-lint-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-lint-
            ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --all -- --check

      # Clippy on lib and bins only - tests have host/no_std conflicts
      # Exclude bootloader (UEFI-only, has #![no_main])
      - name: Clippy (libraries and binaries)
        run: |
          cargo clippy --workspace --exclude morpheus-bootloader --all-features --lib --bins -- -W warnings

  # ═══════════════════════════════════════════════════════════════════════════
  # BUILD-HOST: Compile all crates for host target
  # ═══════════════════════════════════════════════════════════════════════════
  build-host:
    name: Build (Host)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-build-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-
            ${{ runner.os }}-cargo-

      # Bootloader is UEFI-only (#![no_main], uses efi_main) - exclude from host builds
      - name: Build (all features, exclude bootloader)
        run: cargo build --workspace --exclude morpheus-bootloader --all-features

  # ═══════════════════════════════════════════════════════════════════════════
  # TEST-HOST: Run all tests on host target
  # ═══════════════════════════════════════════════════════════════════════════
  test-host:
    name: Test (Host)
    runs-on: ubuntu-latest
    needs: build-host
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-test-
            ${{ runner.os }}-cargo-

      # Install tools for ISO/FAT fixture generation (optional tests)
      - name: Install test dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq genisoimage mtools dosfstools

      # Test workspace crates that support host tests
      # Note: morpheus-bootloader is UEFI-only (has #[panic_handler])
      - name: Run tests (host-testable crates)
        run: |
          cargo test --all-features \
            -p iso9660-rs \
            -p morpheus-core \
            -p morpheus-network \
            -p updater

      # Run iso9660 integration tests that create fixtures
      - name: Run ISO9660 extended tests
        run: |
          cd iso9660
          cargo test --test integration_tests create_test_iso -- --ignored --nocapture || true
        continue-on-error: true

